<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers – Deep Talk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a0a2e, #0d1b38, #0a1a2a);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 10px;
  }
  h1 {
    font-size: 1.7rem;
    margin-bottom: 3px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #a89bc2;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #turn-indicator {
    font-size: 1.1rem;
    margin-bottom: 10px;
    padding: 6px 20px;
    border-radius: 20px;
    font-weight: 600;
    transition: background 0.3s;
  }
  #turn-indicator.red { background: #7b1a4b; }
  #turn-indicator.black { background: #1a3a5c; }

  #score-bar {
    display: flex;
    gap: 30px;
    margin-bottom: 8px;
    font-size: 1rem;
  }
  .score { padding: 4px 14px; border-radius: 10px; font-weight: 600; }
  .score.red { background: #7b1a4b; }
  .score.black { background: #1a3a5c; }

  #board-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(90vw, 500px);
    height: min(90vw, 500px);
    border: 4px solid #7b5ea7;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(100,60,180,0.35);
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
  }
  .cell.light { background: #ede0f5; }
  .cell.dark { background: #4a3060; }
  .cell.valid-move { cursor: pointer; }
  .cell.valid-move::after {
    content: '';
    width: 30%; height: 30%;
    background: rgba(130, 230, 180, 0.75);
    border-radius: 50%;
    position: absolute;
    animation: pulse 1s infinite;
  }
  .cell.valid-jump::after {
    content: '';
    width: 40%; height: 40%;
    background: rgba(255, 120, 180, 0.75);
    border-radius: 50%;
    position: absolute;
    animation: pulse 0.7s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  .piece {
    width: 75%; height: 75%;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 2;
  }
  .piece:hover { transform: scale(1.08); }
  .piece.red-piece {
    background: radial-gradient(circle at 35% 35%, #e879b4, #7b1a4b);
    border: 3px solid #5a0f36;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 -2px 4px rgba(0,0,0,0.2);
  }
  .piece.black-piece {
    background: radial-gradient(circle at 35% 35%, #4a90d9, #1a3a5c);
    border: 3px solid #0f2440;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 -2px 4px rgba(0,0,0,0.2);
  }
  .piece.selected {
    animation: selectedPulse 0.8s ease-in-out infinite;
    box-shadow: 0 0 0 4px #d4b8ff, 0 4px 18px rgba(200,150,255,0.7);
    z-index: 5;
  }
  .piece.just-moved {
    animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.3, 1.2);
    z-index: 10;
  }
  .piece.just-captured {
    animation: capturedPop 0.4s ease-out forwards;
    z-index: 10;
  }
  .piece.just-kinged {
    animation: kingPromotion 0.6s ease-out;
  }

  @keyframes selectedPulse {
    0%, 100% { transform: scale(1.05); box-shadow: 0 0 0 4px #d4b8ff, 0 4px 15px rgba(200,150,255,0.5); }
    50% { transform: scale(1.15); box-shadow: 0 0 0 6px #d4b8ff, 0 6px 28px rgba(200,150,255,0.9); }
  }
  @keyframes slideIn {
    0% { transform: var(--slide-from); opacity: 0.6; filter: brightness(1.5); }
    60% { opacity: 1; filter: brightness(1.2); }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; filter: brightness(1); }
  }
  @keyframes capturedPop {
    0% { transform: scale(1); opacity: 1; }
    30% { transform: scale(1.4); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
  }
  @keyframes kingPromotion {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,184,255,0); }
    40% { transform: scale(1.3); box-shadow: 0 0 22px 12px rgba(212,184,255,0.6); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,184,255,0); }
  }
  .piece.king::after {
    content: '♛';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.6em;
    color: #d4b8ff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }
  .piece-num {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.85em;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    z-index: 3;
    pointer-events: none;
    user-select: none;
  }
  .piece.king .piece-num { top: 28%; font-size: 0.7em; }

  #q-overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 90; align-items: center; justify-content: center; padding: 20px;
  }
  #q-overlay.show { display: flex; }
  #q-box {
    background: linear-gradient(160deg,#1e0a38,#0d1e40);
    border: 2px solid rgba(212,184,255,0.35);
    border-radius: 20px; padding: 36px 32px 28px;
    max-width: 480px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(80,20,160,0.55);
    animation: modalPop 0.35s cubic-bezier(0.2,0.8,0.3,1.2);
  }
  #q-box.wildcard-box {
    background: linear-gradient(160deg,#2a1800,#1a2800);
    border-color: rgba(255,210,50,0.5);
  }
  @keyframes modalPop {
    0% { transform: scale(0.85); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  #q-box .q-cat {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2.5px;
    color: #a889cc; margin-bottom: 14px; display: block;
  }
  #q-box.wildcard-box .q-cat { color: #ffd54f; font-weight: 800; }
  #q-box .q-text {
    font-size: 1.6rem; font-weight: 600; line-height: 1.5;
    color: #f0eaff; margin-bottom: 22px;
  }
  #q-box.wildcard-box .q-text {
    font-size: 1.75rem; font-weight: 900; color: #fff176;
    text-shadow: 0 0 24px rgba(255,215,0,0.45);
  }
  .q-pron { display: none; font-size: 1rem; color: #ffe082; font-style: italic; margin-bottom: 18px; }
  .q-pron.show { display: block; }
  .q-pron .pron-label { display: block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,224,130,0.5); margin-bottom: 3px; font-style: normal; }
  .q-thai { font-size: 1rem; color: #a8e6cf; margin-bottom: 16px; display: none; line-height: 1.5; }
  .q-thai.show { display: block; }
  .q-btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  #q-close-btn {
    padding: 10px 34px; border: none; border-radius: 24px;
    background: linear-gradient(135deg,#7b1a4b,#4a2080);
    color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  #q-close-btn.gold { background: linear-gradient(135deg,#b8860b,#4a3a00); }
  #q-thai-btn {
    padding: 10px 16px; border: 2px solid rgba(168,230,207,0.5);
    border-radius: 24px; background: transparent; color: #a8e6cf;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
  }
  #q-thai-btn:hover { background: #a8e6cf; color: #1a1a2e; }

  #reset-btn {
    margin-top: 12px;
    padding: 8px 28px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #7b1a4b, #4a2080);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #reset-btn:hover { opacity: 0.85; }

  #winner-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #winner-overlay.show { display: flex; }
  #winner-box {
    background: linear-gradient(135deg, #1a0a2e, #0d1b38);
    border: 2px solid #7b5ea7;
    color: #fff;
    padding: 40px 50px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 10px 50px rgba(100,60,180,0.5);
  }
  #winner-box h2 { font-size: 2rem; margin-bottom: 10px; }
  #winner-box p { color: #a89bc2; margin-bottom: 16px; }
  #winner-box button {
    padding: 10px 30px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #7b1a4b, #4a2080);
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 600;
  }
  #winner-box button:hover { opacity: 0.85; }
</style>
</head>
<body>

<h1>♟ Deep Talk Checkers</h1>
<div class="subtitle">Adult Conversation Edition</div>
<div id="score-bar">
  <span class="score red">🟣 Rose: <span id="red-score">12</span></span>
  <span class="score black">🔵 Blue: <span id="black-score">12</span></span>
</div>
<div id="turn-indicator" class="red">Rose's Turn</div>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="q-overlay">
  <div id="q-box">
    <span class="q-cat" id="q-cat"></span>
    <div class="q-text" id="q-text"></div>
    <div class="q-pron" id="q-pron"><span class="pron-label">RP sounds like</span><span id="q-pron-val"></span></div>
    <div class="q-thai" id="q-thai"></div>
    <div class="q-btn-row">
      <button id="q-thai-btn" onclick="toggleQThai()">🇹🇭 ภาษาไทย</button>
      <button id="q-close-btn" onclick="closeQuestion()">Got it — Let’s talk! 💬</button>
    </div>
  </div>
</div>

<button id="reset-btn" onclick="initGame()">New Game</button>

<div id="winner-overlay">
  <div id="winner-box">
    <h2 id="winner-msg"></h2>
    <p>Great conversation tonight.</p>
    <button onclick="initGame(); document.getElementById('winner-overlay').classList.remove('show');">Play Again</button>
  </div>
</div>

<script>
const prompts = [
  { cat: "Regrets", en: "What is your biggest regret in life so far?", th: "ความเสียใจที่ใหญ่ที่สุดในชีวิตของคุณจนถึงตอนนี้คืออะไร?" },
  { cat: "Regrets", en: "Is there something you almost did — but didn't — that still crosses your mind?", th: "มีอะไรที่คุณเกือบทำแต่ไม่ได้ทำ และยังคิดถึงอยู่จนถึงทุกวันนี้?" },
  { cat: "Regrets", en: "What is something you said to someone that you wish you could take back?", th: "มีอะไรที่คุณพูดไปแล้วแต่อยากเอาคืนไหม?" },
  { cat: "Regrets", en: "Is there a person in your past you wish you had treated differently?", th: "มีคนในอดีตที่คุณอยากปฏิบัติต่อแตกต่างออกไปไหม?" },

  { cat: "Dreams", en: "What are your biggest dreams for the future?", th: "ความฝันที่ยิ่งใหญ่ที่สุดของคุณสำหรับอนาคตคืออะไร?" },
  { cat: "Dreams", en: "If fear wasn't a factor, what would you go after in life?", th: "ถ้าความกลัวไม่ใช่ปัจจัย คุณจะตามหาอะไรในชีวิต?" },
  { cat: "Dreams", en: "What does your ideal life look like in 10 years?", th: "ชีวิตที่คุณอยากได้ในอีก 10 ปีข้างหน้าหน้าตาเป็นอย่างไร?" },
  { cat: "Dreams", en: "Is there a dream you've quietly given up on? What happened?", th: "มีความฝันที่คุณยอมปล่อยไปเงียบๆ ไหม? เกิดอะไรขึ้น?" },
  { cat: "Dreams", en: "What is one thing you want to achieve before you die?", th: "สิ่งหนึ่งที่คุณอยากเอาให้สำเร็จก่อนตายคืออะไร?" },

  { cat: "Role Models", en: "Who do you look up to most, and why?", th: "คุณยกย่องใครมากที่สุด และทำไม?" },
  { cat: "Role Models", en: "Who has had the biggest impact on who you are today?", th: "ใครส่งผลกระทบต่อตัวตนของคุณในวันนี้มากที่สุด?" },
  { cat: "Role Models", en: "Is there someone you used to admire who let you down? What happened?", th: "มีใครที่คุณเคยชื่นชมแต่ทำให้คุณผิดหวังไหม? เกิดอะไรขึ้น?" },
  { cat: "Role Models", en: "What quality in someone else do you most wish you had?", th: "คุณสมบัติอะไรในคนอื่นที่คุณอยากมีมากที่สุด?" },

  { cat: "Fear & Courage", en: "What is your greatest fear — be honest.", th: "ความกลัวที่ยิ่งใหญ่ที่สุดของคุณคืออะไร — พูดตรงๆ" },
  { cat: "Fear & Courage", en: "What is the bravest thing you have ever done?", th: "สิ่งที่กล้าหาญที่สุดที่คุณเคยทำคืออะไร?" },
  { cat: "Fear & Courage", en: "What are you afraid people will find out about you?", th: "คุณกลัวว่าคนอื่นจะค้นพบอะไรเกี่ยวกับตัวคุณ?" },
  { cat: "Fear & Courage", en: "What is something that still scares you even as an adult?", th: "มีอะไรที่ยังคงทำให้คุณกลัวแม้จะเป็นผู้ใหญ่แล้ว?" },

  { cat: "People & Love", en: "Who is the most important person in your life right now, and why?", th: "คนที่สำคัญที่สุดในชีวิตของคุณตอนนี้คือใคร และทำไม?" },
  { cat: "People & Love", en: "What does love mean to you — in your own words?", th: "ความรักหมายความว่าอะไรสำหรับคุณ — ในคำพูดของคุณเอง?" },
  { cat: "People & Love", en: "Is there someone you've lost touch with who you miss?", th: "มีใครที่คุณขาดการติดต่อแล้วแต่ยังคิดถึงอยู่ไหม?" },
  { cat: "People & Love", en: "What is the kindest thing anyone has ever done for you?", th: "สิ่งที่ใจดีที่สุดที่ใครบางคนเคยทำให้คุณคืออะไร?" },
  { cat: "People & Love", en: "Have you ever felt truly understood by someone? Who was it?", th: "คุณเคยรู้สึกว่ามีคนเข้าใจคุณอย่างแท้จริงไหม? เป็นใคร?" },

  { cat: "Hardship", en: "What has been the hardest moment of your life?", th: "ช่วงเวลาที่ยากที่สุดในชีวิตของคุณคืออะไร?" },
  { cat: "Hardship", en: "What is something you survived that you didn't think you would?", th: "มีอะไรที่คุณผ่านมาได้โดยที่ไม่คิดว่าจะทำได้?" },
  { cat: "Hardship", en: "What is something you've had to forgive — yourself or someone else?", th: "มีอะไรที่คุณต้องให้อภัย — ตัวเองหรือคนอื่น?" },
  { cat: "Hardship", en: "When life got hard, what kept you going?", th: "เมื่อชีวิตยากลำบาก อะไรที่ทำให้คุณก้าวต่อไปได้?" },

  { cat: "Self", en: "What are you most proud of in your life?", th: "คุณภูมิใจอะไรในชีวิตของคุณมากที่สุด?" },
  { cat: "Self", en: "What is something about yourself you are still working to change?", th: "มีอะไรในตัวคุณที่คุณยังคงพยายามเปลี่ยนแปลงอยู่?" },
  { cat: "Self", en: "What is one thing you love about yourself that you don't say out loud?", th: "มีอะไรที่คุณรักในตัวเองแต่ไม่ค่อยพูดออกมาดังๆ?" },
  { cat: "Self", en: "What do you want to be remembered for?", th: "คุณอยากให้คนจดจำคุณในฐานะอะไร?" },
  { cat: "Self", en: "If you could give your younger self one piece of advice, what would it be?", th: "ถ้าคุณให้คำแนะนำตัวเองในอดีตได้หนึ่งข้อ จะเป็นอะไร?" },

  // Wildcards — RP British accent challenge
  { cat: "🎲 WILDCARD", en: "Say  \"BROTHER\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "bruh-thuh  (not broh-ther)" },
  { cat: "🎲 WILDCARD", en: "Say  \"MOTHER\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "muh-thuh  (not moh-ther)" },
  { cat: "🎲 WILDCARD", en: "Say  \"WHERE\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "weah  (no R — like yeah with a W)" },
  { cat: "🎲 WILDCARD", en: "Say  \"THERE\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "theah  (no R — rhymes with weah)" },
  { cat: "🎲 WILDCARD", en: "Say  \"HERE\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "hee-uh  (two syllables, no R)" },
  { cat: "🎲 WILDCARD", en: "Say  \"HEAR\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "hee-uh  (same as HERE in RP!)" },
  { cat: "🎲 WILDCARD", en: "Say  \"POTATO\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "puh-tay-tuh  (ends in -tuh, not -toe)" },
  { cat: "🎲 WILDCARD", en: "Say  \"TOMATO\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "tuh-mah-tuh  (mah not may!)" },
  { cat: "🎲 WILDCARD", en: "Say  \"BOTTLE\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "boh-ul  (swallow the T!)" },
  { cat: "🎲 WILDCARD", en: "Say  \"WATER\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "waw-uh  (swallow the T!)" },
  { cat: "🎲 WILDCARD", en: "Say  \"TUESDAY\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "chewz-day" },
  { cat: "🎲 WILDCARD", en: "Say  \"TUNA\"  10 times in your best RP British accent!", th: null, wildcard: true, pron: "chew-nuh" },
];

let currentPromptIdx = -1;
let usedPrompts = [];
let board = [];
let currentTurn = 'red';
let selectedPiece = null;
let validMoves = [];
let lastMoveAnim = null;

function initGame() {
  board = [];
  for (let r = 0; r < 8; r++) {
    board[r] = [];
    for (let c = 0; c < 8; c++) {
      board[r][c] = null;
      if ((r + c) % 2 === 1) {
        if (r < 3) board[r][c] = { color: 'black', king: false, num: 0 };
        if (r > 4) board[r][c] = { color: 'red', king: false, num: 0 };
      }
    }
  }
  let redNum = 1, blackNum = 1;
  for (let r = 7; r >= 0; r--)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === 'red') board[r][c].num = redNum++;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === 'black') board[r][c].num = blackNum++;

  currentTurn = 'red';
  selectedPiece = null;
  validMoves = [];
  usedPrompts = [];
  currentPromptIdx = -1;
  updateTurnIndicator();
  updateScores();
  render();
  document.getElementById('q-overlay').classList.remove('show');
}

function updateTurnIndicator() {
  const el = document.getElementById('turn-indicator');
  el.textContent = currentTurn === 'red' ? "Rose's Turn" : "Blue's Turn";
  el.className = currentTurn;
}

function updateScores() {
  let red = 0, black = 0;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c]) board[r][c].color === 'red' ? red++ : black++;
  document.getElementById('red-score').textContent = red;
  document.getElementById('black-score').textContent = black;
  if (red === 0) showWinner('Blue');
  if (black === 0) showWinner('Rose');
}

function showWinner(color) {
  document.getElementById('winner-msg').textContent = color + ' Wins! 🎉';
  document.getElementById('winner-overlay').classList.add('show');
}

function getValidMoves(r, c) {
  const piece = board[r][c];
  if (!piece) return [];
  const moves = [];
  const dirs = [];
  if (piece.color === 'red' || piece.king) dirs.push(-1);
  if (piece.color === 'black' || piece.king) dirs.push(1);
  const sides = [-1, 1];

  for (const dr of dirs) {
    for (const dc of sides) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
        if (!board[nr][nc]) {
          moves.push({ row: nr, col: nc, isJump: false });
        } else if (board[nr][nc].color !== piece.color) {
          const jr = nr + dr, jc = nc + dc;
          if (jr >= 0 && jr < 8 && jc >= 0 && jc < 8 && !board[jr][jc]) {
            moves.push({ row: jr, col: jc, isJump: true, jumpRow: nr, jumpCol: nc });
          }
        }
      }
    }
  }
  return moves;
}

function hasJumpMoves(color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === color)
        if (getValidMoves(r, c).some(m => m.isJump)) return true;
  return false;
}

function hasAnyMoves(color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === color)
        if (getValidMoves(r, c).length > 0) return true;
  return false;
}

function selectPiece(r, c) {
  if (!board[r][c] || board[r][c].color !== currentTurn) return;
  const mustJump = hasJumpMoves(currentTurn);
  let moves = getValidMoves(r, c);
  if (mustJump) moves = moves.filter(m => m.isJump);
  if (moves.length === 0) return;
  selectedPiece = { row: r, col: c };
  validMoves = moves;
  render();
}

function movePiece(target) {
  const move = validMoves.find(m => m.row === target.row && m.col === target.col);
  if (!move) return;

  const sr = selectedPiece.row, sc = selectedPiece.col;
  const wasKingBefore = board[sr][sc].king;
  board[move.row][move.col] = board[sr][sc];
  board[sr][sc] = null;

  let captured = false;
  if (move.isJump) {
    board[move.jumpRow][move.jumpCol] = null;
    captured = true;
  }

  if (board[move.row][move.col].color === 'red' && move.row === 0)
    board[move.row][move.col].king = true;
  if (board[move.row][move.col].color === 'black' && move.row === 7)
    board[move.row][move.col].king = true;

  const wasKinged = !wasKingBefore && board[move.row][move.col].king;
  lastMoveAnim = {
    fromRow: sr, fromCol: sc,
    toRow: move.row, toCol: move.col,
    wasKinged,
    capturedRow: captured ? move.jumpRow : null,
    capturedCol: captured ? move.jumpCol : null
  };

  if (captured) {
    const nextJumps = getValidMoves(move.row, move.col).filter(m => m.isJump);
    if (nextJumps.length > 0) {
      selectedPiece = { row: move.row, col: move.col };
      validMoves = nextJumps;
      updateScores();
      render();
      showPrompt();
      return;
    }
  }

  selectedPiece = null;
  validMoves = [];
  currentTurn = currentTurn === 'red' ? 'black' : 'red';
  updateTurnIndicator();
  updateScores();
  render();
  showPrompt();

  if (!hasAnyMoves(currentTurn)) {
    const winner = currentTurn === 'red' ? 'Blue' : 'Rose';
    setTimeout(() => showWinner(winner), 300);
  }
}

function showPrompt() {
  if (usedPrompts.length >= prompts.length) usedPrompts = [];
  let idx;
  do {
    idx = Math.floor(Math.random() * prompts.length);
  } while (usedPrompts.includes(idx));
  usedPrompts.push(idx);
  currentPromptIdx = idx;
  const p = prompts[idx];
  const box = document.getElementById('q-box');
  document.getElementById('q-cat').textContent = p.cat;
  document.getElementById('q-text').textContent = p.en;
  document.getElementById('q-thai').textContent = '';
  document.getElementById('q-thai').classList.remove('show');
  const pronEl = document.getElementById('q-pron');
  pronEl.classList.remove('show');
  box.classList.remove('wildcard-box');
  const closeBtn = document.getElementById('q-close-btn');
  closeBtn.classList.remove('gold');
  const thaiBtn = document.getElementById('q-thai-btn');
  if (p.wildcard) {
    box.classList.add('wildcard-box');
    document.getElementById('q-pron-val').textContent = p.pron || '';
    pronEl.classList.add('show');
    closeBtn.classList.add('gold');
    thaiBtn.style.display = 'none';
  } else {
    thaiBtn.style.display = '';
  }
  document.getElementById('q-overlay').classList.add('show');
}

function closeQuestion() {
  document.getElementById('q-overlay').classList.remove('show');
}

function toggleQThai() {
  const el = document.getElementById('q-thai');
  if (currentPromptIdx < 0) return;
  if (el.classList.contains('show')) {
    el.classList.remove('show');
  } else {
    el.textContent = prompts[currentPromptIdx].th || '';
    el.classList.add('show');
  }
}

function onCellClick(r, c) {
  if (selectedPiece && validMoves.find(m => m.row === r && m.col === c)) {
    movePiece({ row: r, col: c });
    return;
  }
  if (board[r][c] && board[r][c].color === currentTurn) {
    selectPiece(r, c);
    return;
  }
  selectedPiece = null;
  validMoves = [];
  render();
}

function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

      const isValid = validMoves.find(m => m.row === r && m.col === c);
      if (isValid) cell.classList.add(isValid.isJump ? 'valid-jump' : 'valid-move');

      cell.addEventListener('click', () => onCellClick(r, c));

      if (board[r][c]) {
        const piece = document.createElement('div');
        piece.className = 'piece ' + board[r][c].color + '-piece';
        if (board[r][c].king) piece.classList.add('king');
        if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c)
          piece.classList.add('selected');
        if (lastMoveAnim && lastMoveAnim.toRow === r && lastMoveAnim.toCol === c) {
          const dr = lastMoveAnim.fromRow - lastMoveAnim.toRow;
          const dc = lastMoveAnim.fromCol - lastMoveAnim.toCol;
          piece.style.setProperty('--slide-from', `translate(${dc * 100}%, ${dr * 100}%)`);
          piece.classList.add('just-moved');
          if (lastMoveAnim.wasKinged)
            setTimeout(() => piece.classList.add('just-kinged'), 350);
          piece.addEventListener('animationend', () => {
            piece.classList.remove('just-moved');
            piece.classList.remove('just-kinged');
          });
        }
        const numSpan = document.createElement('span');
        numSpan.className = 'piece-num';
        numSpan.textContent = board[r][c].num;
        piece.appendChild(numSpan);
        cell.appendChild(piece);
      }
      boardEl.appendChild(cell);
    }
  }
  lastMoveAnim = null;
}

initGame();
</script>
